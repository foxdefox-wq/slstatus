name: Build and Release slstatus

on:
  push:
    tags:
      - 'v*' # Triggers automatically whenever you push a tag starting with 'v' (e.g., v1.0)

permissions:
  contents: write # Crucial permission allowing the runner to upload to GitHub Releases

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libx11-dev \
            pkg-config

      - name: Compile slstatus Binary
        run: |
          make

      - name: Create and Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: slstatus  # FIXED: Corrected spelling from 'slstaus' to 'slstatus'
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

